    :root{

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 10% 10%, rgba(138,92,255,.20), transparent 60%),

    .grain{

      transform:translate3d(0,0,0);
      animation: drift 14s linear infinite;
    }
    @keyframes drift{
      0%{transform:translate3d(-2%, -2%, 0)}
      50%{transform:translate3d(2%, 1%, 0)}
      100%{transform:translate3d(-2%, -2%, 0)}
    }

    .wrap{max-width:1100px; margin:0 auto; padding:26px 20px 90px}

    .logo{

      background:
        radial-gradient(18px 18px at 30% 30%, rgba(255,255,255,.22), transparent 55%),
        linear-gradient(135deg, rgba(138,92,255,.95), rgba(0,229,255,.75));
      box-shadow: 0 10px 28px rgba(138,92,255,.20);
      border:1px solid rgba(255,255,255,.14);

    .brand strong{font-weight:800}
    .tagline{font-size:12.5px;color:var(--muted2)}

    .top-cta{display:flex;gap:10px;align-items:center}

    .pill{
      font-size:12.5px;
      color:rgba(255,255,255,.82);
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);

    .btn{

    .hero{

    .heroCard{
      border-radius:22px;

      padding:26px 24px;

    h1{

    .lead{
